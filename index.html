<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal & Admin Console</title>
    <style>
        /* Base Reset & Layout */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation/Address Bar */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        header label {
            font-weight: bold;
            font-size: 14px;
        }

        header input[type="text"] {
            flex-grow: 1;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        header button {
            padding: 8px 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        header button:hover {
            background-color: #2980b9;
        }

        /* Main Workspace Container */
        .workspace {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 54px);
        }

        /* Integrated Web Viewer */
        #webViewer {
            flex-grow: 1;
            border: none;
            background: #ffffff;
            height: 100%;
        }

        /* Sidebar Administrative Controls */
        .admin-sidebar {
            width: 280px;
            background-color: #222;
            color: #fff;
            border-left: 2px solid #34495e;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-sidebar h3 {
            margin-top: 0;
            color: #3498db;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        .status-text {
            font-size: 13px;
            color: #bbb;
        }

        .status-text span {
            color: #2ecc71;
            font-weight: bold;
        }

        /* Embedded Terminal/CMD Box */
        .cmd-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: -5px;
        }

        .cmd-box {
            width: 100%;
            padding: 10px;
            background-color: #000;
            color: #00ff00;
            border: 1px solid #333;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            outline: none;
        }

        .cmd-hint {
            font-size: 11px;
            color: #777;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Unified Address Bar -->
    <header>
        <label for="urlInput">BROWSER:</label>
        <input type="text" id="urlInput" placeholder="Enter target URL (e.g., youtube.com)">
        <button onclick="navigateStream()">Load Link</button>
    </header>

    <!-- App Body Area -->
    <div class="workspace">
        
        <!-- The display area for targeted web traffic -->
        <iframe id="webViewer" src="about:blank"></iframe>

        <!-- Sidebar incorporating management configurations -->
        <div class="admin-sidebar" id="controlPanel">
            <h3>Management Console</h3>
            
            <div class="status-text">
                System Status: <span>ONLINE</span>
            </div>
            <div class="status-text">
                Active Sessions: <span id="sessionCounter">1</span>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #333; width: 100%;">

            <label class="cmd-label" for="cmdInput">Command Line Interface</label>
            <input type="text" id="cmdInput" class="cmd-box" placeholder="type /kick [username]" onkeypress="executeCommand(event)">
            <p class="cmd-hint">Available commands: <code>/kick [name]</code>, <code>/clear</code></p>
        </div>
    </div>

    <script>
        // Core functionality to change the iframe destination
        function navigateStream() {
            let targetUrl = document.getElementById('urlInput').value.trim();
            if (!targetUrl) return;

            // Ensure schema protocol exists
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                targetUrl = 'https://' + targetUrl;
            }

            // Note: Standalone iframes face restrictions from sites utilizing X-Frame-Options headers
            document.getElementById('webViewer').src = targetUrl;
        }

        // Administrative terminal event handling
        function executeCommand(event) {
            if (event.key === 'Enter') {
                const consoleInput = document.getElementById('cmdInput');
                const rawCommand = consoleInput.value.trim();

                if (rawCommand.startsWith('/kick')) {
                    const TargetUser = rawCommand.split(' ')[1];
                    if (TargetUser) {
                        alert('Administrative Signal Dispatched: Disconnecting user [' + TargetUser + ']');
                    } else {
                        alert('Error: Please specify a target user. Example: /kick guest123');
                    }
                } else if (rawCommand === '/clear') {
                    consoleInput.value = '';
                } else {
                    alert('Command error: Explicit instruction string unrecognized.');
                }
                
                // Clear command line input after action execution
                consoleInput.value = '';
            }
        }
    </script>
</body>
</html>
