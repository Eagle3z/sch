<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal & Admin Console</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <!-- Unified Address Bar -->
    <header>
        <label for="urlInput">BROWSER:</label>
        <input type="text" id="urlInput" placeholder="Enter target URL (e.g., youtube.com)">
        <button onclick="navigateStream()">Load Link</button>
    </header>

    <!-- App Body Area -->
    <div class="workspace">
        <iframe id="webViewer" src="about:blank"></iframe>

        <!-- Sidebar Administrative Controls -->
        <div class="admin-sidebar" id="controlPanel">
            <h3>Management Console</h3>
            
            <div class="status-text">Your Identity: <span id="identityText" style="color:#3498db;">Generating...</span></div>
            <div class="status-text">Current Permission: <span id="permissionText" style="color:#e74c3c;">Guest</span></div>
            <div class="status-text">Active Sessions: <span id="sessionCounter">1</span></div>
            
            <hr>

            <!-- Console Log Output Box -->
            <label class="cmd-label">System Output</label>
            <div id="terminalOutput" class="terminal-log"></div>

            <label class="cmd-label" for="cmdInput">Command Line Interface</label>
            <input type="text" id="cmdInput" class="cmd-box" placeholder="type command here..." onkeypress="executeCommand(event)">
            <p class="cmd-hint">Commands: <code>role Owner</code>, <code>online</code>, <code>/kick [name]</code>, <code>/ban [name]</code>, <code>/unban [name]</code></p>
        </div>
    </div>

    <script>
        // Set up client profile state variables
        let myPermission = "Guest";
        
        // Generate a random guest user name on load
        const randomID = Math.floor(1000 + Math.random() * 9000);
        const myUsername = "Guest_" + randomID;
        document.getElementById('identityText').innerText = myUsername;

        function printToTerminal(text) {
            const output = document.getElementById('terminalOutput');
            output.innerHTML += `<div>> ${text}</div>`;
            output.scrollTop = output.scrollHeight; // Auto-scroll to bottom
        }

        function navigateStream() {
            let targetUrl = document.getElementById('urlInput').value.trim();
            if (!targetUrl) return;
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                targetUrl = 'https://' + targetUrl;
            }
            document.getElementById('webViewer').src = targetUrl;
        }

        function executeCommand(event) {
            if (event.key === 'Enter') {
                const consoleInput = document.getElementById('cmdInput');
                const rawCommand = consoleInput.value.trim();
                if (!rawCommand) return;

                printToTerminal(rawCommand);

                // Command processing logic
                if (rawCommand === "role Owner") {
                    myPermission = "Owner";
                    document.getElementById('permissionText').innerText = "Owner";
                    document.getElementById('permissionText').style.color = "#2ecc71";
                    printToTerminal("Permission Escalated: Owner privileges granted.");
                } 
                else if (rawCommand === "online") {
                    // Simulating a list (In production, this requests data from server.js)
                    printToTerminal("--- Online Users ---");
                    printToTerminal(`${myUsername} (${myPermission}) [You]`);
                    printToTerminal("Guest_4829 (Guest)");
                } 
                else if (rawCommand.startsWith('/kick ')) {
                    if (myPermission !== "Owner") {
                        printToTerminal("Error: Access denied. Requires Owner permissions.");
                    } else {
                        const target = rawCommand.split(' ')[1];
                        printToTerminal(`Dispatched DISCONNECT signal to target: ${target}`);
                    }
                } 
                else if (rawCommand.startsWith('/ban ')) {
                    if (myPermission !== "Owner") {
                        printToTerminal("Error: Access denied. Requires Owner permissions.");
                    } else {
                        const target = rawCommand.split(' ')[1];
                        printToTerminal(`Added target to Network Blocklist: ${target}`);
                    }
                } 
                else if (rawCommand.startsWith('/unban ')) {
                    if (myPermission !== "Owner") {
                        printToTerminal("Error: Access denied. Requires Owner permissions.");
                    } else {
                        const target = rawCommand.split(' ')[1];
                        printToTerminal(`Removed target from Network Blocklist: ${target}`);
                    }
                } 
                else {
                    printToTerminal("Command error: Instruction unrecognized.");
                }

                consoleInput.value = '';
            }
        }
    </script>
</body>
</html>
