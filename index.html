<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Proxy Dashboard</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="left-sidebar">
        <div>
            <div class="sidebar-brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span>DASHBOARD</span>
            </div>
            
            <nav class="sidebar-menu">
                <button class="menu-btn active" onclick="showDashboardHome()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Proxy Workspace
                </button>
                <button class="menu-btn" onclick="logToTerminal('Switched to CroxyProxy Social Workspace')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    CroxyProxy Social
                </button>
            </nav>
        </div>

        <div class="sidebar-footer">
            <button class="refresh-btn" onclick="window.location.reload();">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                Refresh App
            </button>
        </div>
    </aside>

    <main class="main-content">
        
        <section id="proxyHomeView" class="proxy-container">
            <h1 class="proxy-title">Proxy Gateway</h1>
            
            <p class="proxy-subtitle">
                Enter an address or query below to route traffic dynamically through your secure network proxy channel.
            </p>

            <div class="search-box-wrapper">
                <div class="search-input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a48e77" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="urlInput" placeholder="Enter a search query or a website URL link...">
                <button class="go-btn" onclick="launchProxy()">Go!</button>
            </div>

            <div class="quick-links">
                <span class="links-title">Quick links:</span>
                <div class="links-cloud">
                    <a href="#" onclick="setURL('duckduckgo.com')">DuckDuckGo</a>
                    <a href="#" onclick="setURL('google.com')">Google</a>
                    <a href="#" onclick="setURL('youtube.com')">YouTube</a>
                    <a href="#" onclick="setURL('facebook.com')">Facebook</a>
                    <a href="#" onclick="setURL('wikipedia.org')">Wikipedia</a>
                    <a href="#" onclick="setURL('reddit.com')">Reddit</a>
                </div>
            </div>

            <div class="admin-terminal-section">
                <div class="terminal-header">
                    <div class="terminal-dots"><span></span><span></span><span></span></div>
                    <div class="terminal-meta">Identity: <span id="identityText">...</span> | Permission: <span id="roleText">Guest</span></div>
                </div>
                <div id="terminalLog" class="terminal-screen"></div>
                <div class="terminal-input-wrapper">
                    <span class="terminal-prompt">admin$</span>
                    <input type="text" id="cmdInput" class="terminal-input" placeholder="Type administrative commands here..." onkeypress="handleAdminCommand(event)">
                </div>
            </div>
        </section>

        <div id="realBrowserView" class="right-side-web-frame" style="display: none;">
            <div class="browser-header-navigation">
                <div class="browser-address-pill">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <span id="browserUrlIndicator">Loading proxy layer...</span>
                </div>
                <button class="exit-browser-btn" onclick="showDashboardHome()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    Exit Web View
                </button>
            </div>
            <iframe id="liveWebRenderer" src="about:blank"></iframe>
        </div>

    </main>

    <script>
        let userRole = "Guest";
        let username = "";

        function loadIdentity() {
            const savedUser = localStorage.getItem('portal_user');
            if (savedUser) {
                username = savedUser;
            } else {
                username = "Guest_" + Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem('portal_user', username);
            }
            document.getElementById('identityText').innerText = username;

            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                applyDisconnectionBlock();
            } else {
                logToTerminal(`Proxy core engine online. Active user: [${username}]`);
            }
        }

        function logToTerminal(msg) {
            const screen = document.getElementById('terminalLog');
            if(screen) {
                screen.innerHTML += `<div><span style="color:#7f8c8d;">[${new Date().toLocaleTimeString()}]</span> ${msg}</div>`;
                screen.scrollTop = screen.scrollHeight;
            }
        }

        function setURL(url) {
            document.getElementById('urlInput').value = url;
            launchProxy();
        }

        function launchProxy() {
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                alert("Security lock: Session terminated.");
                return;
            }

            let inputTarget = document.getElementById('urlInput').value.trim();
            if (!inputTarget) return;

            if (inputTarget.toLowerCase() === 'duckduckgo') inputTarget = 'https://duckduckgo.com';
            if (inputTarget.toLowerCase() === 'youtube') inputTarget = 'https://youtube.com';
            if (inputTarget.toLowerCase() === 'google') inputTarget = 'https://google.com';

            if (!inputTarget.startsWith('http://') && !inputTarget.startsWith('https://')) {
                inputTarget = 'https://' + inputTarget;
            }

            logToTerminal(`Routing live data stream: ${inputTarget}`);
            document.getElementById('browserUrlIndicator').innerText = inputTarget;

            // Sends to your proxy endpoint route handling web data requests
            document.getElementById('liveWebRenderer').src = `/proxy?url=${encodeURIComponent(inputTarget)}`;
            
            document.getElementById('proxyHomeView').style.display = "none";
            document.getElementById('realBrowserView').style.display = "flex";
        }

        function showDashboardHome() {
            document.getElementById('realBrowserView').style.display = "none";
            document.getElementById('proxyHomeView').style.display = "block";
            document.getElementById('liveWebRenderer').src = "about:blank";
        }

        function applyDisconnectionBlock() {
            showDashboardHome();
            document.getElementById('proxyHomeView').innerHTML = `
                <div style="text-align:center; padding: 120px 20px; color:#e74c3c;">
                    <h1 style="font-size: 38px; font-weight:700; margin-bottom: 12px;">🔴 Connection Closed</h1>
                    <p style="color:#7f8c8d; font-size:15px;">Administrative control signals closed web access routes for profile signature: <b>${username}</b></p>
                </div>
            `;
        }

        function handleAdminCommand(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('cmdInput');
                const cmd = input.value.trim();
                if (!cmd) return;

                logToTerminal(`<span style="color:#fff;">$ ${cmd}</span>`);

                if (cmd === "role Owner") {
                    userRole = "Owner";
                    document.getElementById('roleText').innerText = "Owner";
                    document.getElementById('roleText').style.color = "#2ecc71";
                    logToTerminal("Permissions updated: Master Admin Active.");
                } else if (cmd === "online") {
                    logToTerminal("--- Active Connections ---");
                    logToTerminal(`${username} (${userRole}) [Local Instance]`);
                } else if (cmd.startsWith('/kick ')) {
                    if (userRole !== "Owner") { logToTerminal("Error: Denied."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Terminating web view frame instances for target identity: ${target}`);
                    if (target === username) {
                        localStorage.setItem('isKicked', 'true');
                        setTimeout(applyDisconnectionBlock, 500);
                    }
                } else if (cmd.startsWith('/ban ')) {
                    if (userRole !== "Owner") { logToTerminal("Error: Denied."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Applying persistent proxy routing block rule for: ${target}`);
                    if (target === username) {
                        localStorage.setItem('isBanned', 'true');
                        setTimeout(applyDisconnectionBlock, 500);
                    }
                } else if (cmd.startsWith('/unban ')) {
                    if (userRole !== "Owner") { logToTerminal("Error: Denied."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Clearing structural rule restrictions for: ${target}`);
                    if (target === username) {
                        localStorage.removeItem('isBanned');
                        localStorage.removeItem('isKicked');
                        window.location.reload();
                    }
                } else {
                    logToTerminal("Terminal warning: Unrecognized operational parameter string.");
                }
                input.value = '';
            }
        }

        window.onload = loadIdentity;
    </script>
</body>
</html>
