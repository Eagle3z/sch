<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal - Fullscreen Bottom Terminal Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Top Workspace Layout Wrapper */
        .workspace-wrapper {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 180px); /* Leaves exact space for the bottom console panel */
        }

        /* Sidebar Navigation Layout */
        .sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00aaff;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .nav-btn {
            padding: 12px;
            background: #2c2c2c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #444;
        }

        .nav-btn.active {
            background: rgba(0, 170, 255, 0.2);
            color: #00aaff;
            border-left: 4px solid #00aaff;
        }

        /* Content Area Container */
        .content {
            flex-grow: 1;
            height: 100%;
            background: #121212;
            position: relative;
        }

        /* Clean Embedded Frame Canvas */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* FULLSCREEN BOTTOM TERMINAL LAYER */
        .admin-terminal-section {
            width: 100%;
            height: 180px; /* Locked bottom heights panel */
            background: #16161a;
            border-top: 1px solid #2d2d35;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            z-index: 10;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3a3a44;
        }

        .terminal-meta {
            font-size: 11px;
            font-weight: 600;
            color: #8a8a93;
            font-family: monospace;
        }

        .terminal-screen {
            flex-grow: 1;
            background-color: #09090b;
            color: #00aaff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .terminal-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #1f1f23;
            border-radius: 6px;
            padding: 2px 12px;
            border: 1px solid #2d2d35;
        }

        .terminal-prompt {
            font-family: monospace;
            font-size: 13px;
            color: #8a8a93;
            margin-right: 8px;
            font-weight: bold;
        }

        .terminal-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: monospace;
            font-size: 13px;
            outline: none;
            color: white;
        }
    </style>
</head>
<body>

    <div class="workspace-wrapper">
        <div class="sidebar">
            <h2>DASHBOARD</h2>
            <button id="btn-yt" class="nav-btn active" onclick="loadSite('https://www.youtube.com', 'btn-yt')">YouTube</button>
            <button id="btn-tt" class="nav-btn" onclick="loadSite('https://www.tiktok.com', 'btn-tt')">TikTok</button>
            <button id="btn-croxy" class="nav-btn" onclick="loadSite('https://www.croxyproxy.com/social', 'btn-croxy')">CroxyProxy Social</button>
            <button class="nav-btn" style="margin-top: auto; background: #222; color: #aaa;" onclick="location.reload()">Refresh App</button>
        </div>

        <div class="content" id="mainContentCanvas">
            <iframe id="main-frame" name="view" src="about:blank" allow="autoplay; encrypted-media; fullscreen;"></iframe>
        </div>
    </div>

    <div class="admin-terminal-section">
        <div class="terminal-header">
            <div class="terminal-dots"><span></span><span></span><span></span></div>
            <div class="terminal-meta">
                Player Name: <span id="playerNameText" style="color: #00ff77; margin-right: 15px;">...</span> 
                Identity: <span id="identityText" style="color: #00aaff;">...</span> | 
                Permission: <span id="roleText" style="color: #aaa;">Guest</span>
            </div>
        </div>
        <div id="terminalLog" class="terminal-screen"></div>
        <div class="terminal-input-wrapper">
            <span class="terminal-prompt">admin$</span>
            <input type="text" id="cmdInput" class="terminal-input" placeholder="Type administrative commands here (e.g., name Neo, role Owner)..." onkeypress="handleAdminCommand(event)">
        </div>
    </div>

    <script>
        let userRole = "Guest";
        let username = "";
        let playerName = "";

        // Instantiates local cache profile configurations and identity definitions
        function loadIdentity() {
            // Set up registration identity
            const savedUser = localStorage.getItem('portal_user');
            if (savedUser) {
                username = savedUser;
            } else {
                username = "Guest_" + Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem('portal_user', username);
            }
            document.getElementById('identityText').innerText = username;

            // Set up customizable Player Name
            const savedPlayerName = localStorage.getItem('player_name');
            if (savedPlayerName) {
                playerName = savedPlayerName;
            } else {
                playerName = "Player_" + Math.floor(100 + Math.random() * 900);
                localStorage.setItem('player_name', playerName);
            }
            document.getElementById('playerNameText').innerText = playerName;

            // Enforces structural block constraints if configured in local cache memory
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                applyDisconnectionBlock();
            } else {
                logToTerminal(`Terminal gateway responsive. Welcome back, ${playerName}! Profile: [${username}]`);
            }
        }

        function logToTerminal(msg) {
            const screen = document.getElementById('terminalLog');
            if(screen) {
                screen.innerHTML += `<div><span style="color:#555;">[${new Date().toLocaleTimeString()}]</span> ${msg}</div>`;
                screen.scrollTop = screen.scrollHeight;
            }
        }

        function loadSite(url, btnId) {
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                return;
            }
            
            let finalUrl = url;
            
            // AUTOMATED ROUTING LAYER: If visiting YouTube or TikTok, automatically secure through an embedded web path layer
            if (url.includes('youtube.com') || url.includes('tiktok.com')) {
                logToTerminal(`Proxy Tunnel Triggered: Re-routing ${url} link securely via automated proxy gateway layer...`);
                finalUrl = "https://www.croxyproxy.com/_embed/processing?url=" + encodeURIComponent(url);
            }

            // Update main sandbox frame content element destination variables
            document.getElementById('main-frame').src = finalUrl;
            logToTerminal(`Updating active layout frame viewport reference to: ${url}`);

            // Toggle active highlighting cleanly across menus
            document.querySelectorAll('.sidebar .nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnId) {
                document.getElementById(btnId).classList.add('active');
            }
        }

        function applyDisconnectionBlock() {
            document.getElementById('mainContentCanvas').innerHTML = `
                <div style="text-align:center; padding: 150px 20px; color:#ff4444; background: #0b0b0d; height: 100%;">
                    <h1 style="font-size: 36px; font-weight:700; margin-bottom: 12px; font-family: sans-serif;">🔴 System Access Revoked</h1>
                    <p style="color:#777; font-size:15px; font-family: monospace;">Administrative block rules active on system registration signature: <b>${username}</b></p>
                </div>
            `;
        }

        // Administrative Core Console Engine Process Rule Input Handler
        function handleAdminCommand(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('cmdInput');
                const cmd = input.value.trim();
                if (!cmd) return;

                // Echo typed parameter instructions onto terminal tracking screen
                logToTerminal(`<span style="color:#fff;">$ ${cmd}</span>`);

                // 1. Name configuration parameter handler
                if (cmd.startsWith('name ')) {
                    const newName = cmd.substring(5).trim();
                    if(newName) {
                        playerName = newName;
                        localStorage.setItem('player_name', newName);
                        document.getElementById('playerNameText').innerText = newName;
                        logToTerminal(`Player name changed successfully to: <span style="color:#00ff77;">${newName}</span>`);
                    } else {
                        logToTerminal("Error syntax: Please supply a valid string argument.");
                    }
                } 
                // 2. Privilege level escalation command handler
                else if (cmd === "role Owner") {
                    userRole = "Owner";
                    document.getElementById('roleText').innerText = "Owner";
                    document.getElementById('roleText').style.color = "#00ff77";
                    logToTerminal("Permissions status escalated: Master Admin access key matches.");
                } 
                // 3. Status registry viewer command handler
                else if (cmd === "online") {
                    logToTerminal("--- Network Instance Table Registry ---");
                    logToTerminal(`Player: ${playerName} | User ID: ${username} | Role: ${userRole} [Client Node Active]`);
                } 
                // 4. Kick procedure rule parameter handler
                else if (cmd.startsWith('/kick ')) {
                    if (userRole !== "Owner") { logToTerminal("Error status code: Access command blocked. Owner permissions needed."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Closing transmission gateway pipeline structure rules for user string: ${target}`);
                    if (target === username) {
                        localStorage.setItem('isKicked', 'true');
                        setTimeout(applyDisconnectionBlock, 600);
                    }
                } 
                // 5. Permanent database filter flag ban procedure rule handler
                else if (cmd.startsWith('/ban ')) {
                    if (userRole !== "Owner") { logToTerminal("Error status code: Access command blocked. Owner permissions needed."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Writing persistent database server network hardware blocking filter flag for: ${target}`);
                    if (target === username) {
                        localStorage.setItem('isBanned', 'true');
                        setTimeout(applyDisconnectionBlock, 600);
                    }
                } 
                // 6. Access restriction removal clear handler routine
                else if (cmd.startsWith('/unban ')) {
                    if (userRole !== "Owner") { logToTerminal("Error status code: Access command blocked. Owner permissions needed."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Clearing cached session variable parameters for client handle: ${target}`);
                    if (target === username) {
                        localStorage.removeItem('isBanned');
                        localStorage.removeItem('isKicked');
                        window.location.reload();
                    }
                } 
                else {
                    logToTerminal("<span style="color:#ff4444;">Terminal warning code syntax error: Parameter input unverified.</span>");
                }
                input.value = '';
            }
        }

        // Execution setup routine triggers on window object assembly 
        window.onload = function() {
            loadIdentity();
            loadSite('https://www.youtube.com', 'btn-yt');
        };
    </script>

</body>
</html>
