<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Portal - Dynamic Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation Layout */
        .sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00aaff;
            text-align: center;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .nav-btn {
            padding: 12px;
            background: #2c2c2c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #444;
        }

        .nav-btn.active {
            background: rgba(0, 170, 255, 0.2);
            color: #00aaff;
            border-left: 4px solid #00aaff;
        }

        /* Content Canvas Panel Space */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #121212;
            position: relative;
        }

        /* Clean Frame Element Viewport */
        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: white;
        }

        /* Embedded Terminal Interface Console Design */
        .admin-terminal-section {
            background: #16161a;
            border-top: 1px solid #2d2d35;
            padding: 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3a3a44;
        }

        .terminal-meta {
            font-size: 11px;
            font-weight: 600;
            color: #8a8a93;
            font-family: monospace;
        }

        .terminal-screen {
            height: 100px;
            background-color: #09090b;
            color: #00aaff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .terminal-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #1f1f23;
            border-radius: 6px;
            padding: 4px 12px;
            border: 1px solid #2d2d35;
        }

        .terminal-prompt {
            font-family: monospace;
            font-size: 13px;
            color: #8a8a93;
            margin-right: 8px;
            font-weight: bold;
        }

        .terminal-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: monospace;
            font-size: 13px;
            outline: none;
            color: white;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>DASHBOARD</h2>
        <button id="btn-yt" class="nav-btn active" onclick="loadSite('https://www.unblockyoutube.co/', 'btn-yt')">YouTube Unblock</button>
        <button id="btn-croxy" class="nav-btn" onclick="loadSite('https://www.croxyproxy.com/social', 'btn-croxy')">CroxyProxy Social</button>
        <button class="nav-btn" style="margin-top: auto; background: #222; color: #aaa;" onclick="location.reload()">Refresh App</button>
    </div>

    <div class="content" id="mainContentCanvas">
        <iframe id="main-frame" name="view" src="about:blank"></iframe>

        <div class="admin-terminal-section">
            <div class="terminal-header">
                <div class="terminal-dots"><span></span><span></span><span></span></div>
                <div class="terminal-meta">Identity: <span id="identityText" style="color: #00aaff;">...</span> | Permission: <span id="roleText" style="color: #aaa;">Guest</span></div>
            </div>
            <div id="terminalLog" class="terminal-screen"></div>
            <div class="terminal-input-wrapper">
                <span class="terminal-prompt">admin$</span>
                <input type="text" id="cmdInput" class="terminal-input" placeholder="Type administrative commands here (e.g., role Owner)..." onkeypress="handleAdminCommand(event)">
            </div>
        </div>
    </div>

    <script>
        let userRole = "Guest";
        let username = "";

        // Instantiates local cache profile configuration identities
        function loadIdentity() {
            const savedUser = localStorage.getItem('portal_user');
            if (savedUser) {
                username = savedUser;
            } else {
                username = "Guest_" + Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem('portal_user', username);
            }
            document.getElementById('identityText').innerText = username;

            // Enforces structural ban state constraints if configured inside cache
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                applyDisconnectionBlock();
            } else {
                logToTerminal(`Terminal gateway responsive. Session profile loaded: [${username}]`);
            }
        }

        function logToTerminal(msg) {
            const screen = document.getElementById('terminalLog');
            if(screen) {
                screen.innerHTML += `<div><span style="color:#555;">[${new Date().toLocaleTimeString()}]</span> ${msg}</div>`;
                screen.scrollTop = screen.scrollHeight;
            }
        }

        function loadSite(url, btnId) {
            if (localStorage.getItem('isBanned') === 'true' || localStorage.getItem('isKicked') === 'true') {
                return;
            }
            
            // Set frame path destination link reference target parameters
            document.getElementById('main-frame').src = url;
            logToTerminal(`Updating active layout wrapper container channel window target to: ${url}`);

            // Toggle active styling highlights cleanly across menus
            document.querySelectorAll('.sidebar .nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnId) {
                document.getElementById(btnId).classList.add('active');
            }
        }

        function applyDisconnectionBlock() {
            document.getElementById('mainContentCanvas').innerHTML = `
                <div style="text-align:center; padding: 150px 20px; color:#ff4444; background: #0b0b0d; height: 100%;">
                    <h1 style="font-size: 36px; font-weight:700; margin-bottom: 12px; font-family: sans-serif;">🔴 System Access Revoked</h1>
                    <p style="color:#777; font-size:15px; font-family: monospace;">Administrative block rules active on system registration signature: <b>${username}</b></p>
                </div>
            `;
        }

        // Administrative Core Engine Process Rules Handling Logic
        function handleAdminCommand(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('cmdInput');
                const cmd = input.value.trim();
                if (!cmd) return;

                // Echo the entered terminal command back onto console array
                logToTerminal(`<span style="color:#fff;">$ ${cmd}</span>`);

                if (cmd === "role Owner") {
                    userRole = "Owner";
                    document.getElementById('roleText').innerText = "Owner";
                    document.getElementById('roleText').style.color = "#00ff77";
                    logToTerminal("Permissions status escalated: Master Admin access key matches.");
                } else if (cmd === "online") {
                    logToTerminal("--- Network Instance Table Registry ---");
                    logToTerminal(`${username} (${userRole}) [Local Dashboard Client Node Active]`);
                } else if (cmd.startsWith('/kick ')) {
                    if (userRole !== "Owner") { logToTerminal("Error status code: Access command blocked. Owner permissions needed."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Closing transmission gateway pipeline structure rules for user string: ${target}`);
                    if (target === username) {
                        localStorage.setItem('isKicked', 'true');
                        setTimeout(applyDisconnectionBlock, 600);
                    }
                } else if (cmd.startsWith('/ban ')) {
                    if (userRole !== "Owner") { logToTerminal("Error status code: Access command blocked. Owner permissions needed."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Writing persistent database server network hardware blocking filter flag for: ${target}`);
                    if (target === username) {
                        localStorage.setItem('isBanned', 'true');
                        setTimeout(applyDisconnectionBlock, 600);
                    }
                } else if (cmd.startsWith('/unban ')) {
                    if (userRole !== "Owner") { logToTerminal("Error status code: Access command blocked. Owner permissions needed."); input.value = ''; return; }
                    const target = cmd.split(' ')[1];
                    logToTerminal(`Clearing cached session variable parameters for client handle: ${target}`);
                    if (target === username) {
                        localStorage.removeItem('isBanned');
                        localStorage.removeItem('isKicked');
                        window.location.reload();
                    }
                } else {
                    logToTerminal("<span style="color:#ff4444;">Terminal warning code syntax error: Parameter input unverified.</span>");
                }
                input.value = '';
            }
        }

        // Initial launch configuration load routine triggers
        window.onload = function() {
            loadIdentity();
            loadSite('https://www.youtube.com/', 'btn-yt');
        };
    </script>

</body>
</html>
